name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f constraints.lock ]; then
            pip install -r requirements.txt -c constraints.lock
          else
            pip install -r requirements.txt
          fi

      - name: Run backend unit tests
        env:
          API_AUTH_REQUIRED: "false"
          AUTO_START_AGENT: "false"
          AUTO_START_LIVE_FEED: "false"
          ENABLE_AI_COUNCIL: "false"
          ENABLE_NEURAL_LAB: "false"
          ENABLE_QUANTUM_LAB: "false"
          ENABLE_MARL_LAB: "false"
          ENABLE_GOAL_GOVERNOR: "false"
        run: python -m unittest discover -s tests -v

  frontend:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hft_frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hft_frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
