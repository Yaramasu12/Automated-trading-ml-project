services:

  # ── FastAPI trading backend ──────────────────────────────────────────────
  trading-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backtest_results:/app/backtest_results
      - ./models:/app/models
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Daily scheduler (EOD square-off, instrument refresh, reports) ────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-scheduler
    restart: unless-stopped
    command: ["python", "scripts/daily_scheduler.py"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      trading-api:
        condition: service_healthy

  # ── React frontend (built → Nginx, proxies /api and /ws to backend) ──────
  frontend:
    build:
      context: ./hft_frontend
      dockerfile: Dockerfile
    container_name: trading-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      trading-api:
        condition: service_healthy

networks:
  default:
    name: trading-network
